<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SR Capture Test</title>
  </head>
  <body>
    <div id="status">loading</div>
    <input id="test-input" type="text" placeholder="Enter your email" style="display:block" />
    <button id="test-button" aria-label="Submit form">Submit</button>
    <script type="module">
      import * as sessionReplay from '@amplitude/session-replay-browser';

      window.sessionReplay = sessionReplay;

      const params = new URLSearchParams(location.search);
      const sampleRate = params.has('sampleRate') ? Number(params.get('sampleRate')) : 1.0;
      const optOut = params.get('optOut') === 'true';
      const sessionId = params.has('sessionId') ? Number(params.get('sessionId')) : Date.now();
      const deviceId = params.get('deviceId') ?? 'test-device-id';
      const logLevel = params.has('logLevel') ? Number(params.get('logLevel')) : 0;
      const useWebWorker = params.get('useWebWorker') === 'true';

      void (async () => {
        try {
          await sessionReplay.init('d90c5cf09ca2546a1626272906b99a76', {
            deviceId,
            sessionId,
            sampleRate,
            optOut,
            logLevel,
            useWebWorker,
          }).promise;
        } catch (err) {
          document.getElementById('status').textContent = 'error: ' + err.message;
          window.srError = err.message;
        }

        window.srReady = true;
        document.getElementById('status').textContent = 'ready';
      })();
    </script>
  </body>
</html>
