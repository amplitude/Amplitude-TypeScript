<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SR Privacy Test</title>
  </head>
  <body>
    <!-- Plain text — visible under 'light'/'medium', masked under 'conservative' -->
    <p id="plain-text">Hello visible world</p>

    <!-- Text masked via CSS class (rrweb maskTextClass) -->
    <p id="amp-mask-text" class="amp-mask">Secret masked text</p>

    <!-- Element blocked via CSS class (rrweb blockClass) -->
    <div id="amp-block-element" class="amp-block">Blocked content</div>

    <!-- Masked container with an explicitly unmasked child -->
    <div id="masked-container" class="amp-mask">
      Outer masked text
      <span id="unmask-span">Inner visible text</span>
    </div>

    <!-- Text input: masked in 'medium'/'conservative', not in 'light' -->
    <input id="text-input" type="text" value="visible input value" />

    <!-- Password input: always masked ('light' and above) -->
    <input id="password-input" type="password" value="secret123" />

    <!-- Textarea: under medium/conservative, value is masked; under light (non-sensitive), visible -->
    <textarea id="text-area">multi-line textarea content</textarea>

    <!-- Select: under medium/conservative, value is masked -->
    <select id="select-input"><option value="option-one" selected>option-one</option></select>

    <!-- Element for selector-based blocking via privacyConfig.blockSelector -->
    <div id="selector-blocked">Selector blocked content</div>

    <!-- Text with amp-unmask class: should be visible under conservative masking
         without requiring an explicit unmaskSelector in privacyConfig (SR-2945) -->
    <p id="amp-unmask-text" class="amp-unmask">Unmask class visible text</p>

    <div id="status">loading</div>
    <script type="module">
      import * as sessionReplay from '@amplitude/session-replay-browser';

      window.sessionReplay = sessionReplay;

      const params = new URLSearchParams(location.search);
      const sessionId = params.has('sessionId') ? Number(params.get('sessionId')) : Date.now();
      const deviceId = params.get('deviceId') ?? 'test-device-id';
      const logLevel = params.has('logLevel') ? Number(params.get('logLevel')) : 0;
      const privacyConfig = params.has('privacyConfig') ? JSON.parse(params.get('privacyConfig')) : undefined;
      const apiKey = params.get('apiKey') ?? 'd90c5cf09ca2546a1626272906b99a76';
      // Tri-state pass-through so omitting the param preserves the SDK default; tests that rely on
      // a focus-triggered full snapshot (e.g. SPA URL-change masking) opt in with `true`, since the
      // SDK default is now false (SR-4646).
      const captureFullSnapshotOnFocus =
        params.get('captureFullSnapshotOnFocus') === null ? undefined : params.get('captureFullSnapshotOnFocus') === 'true';

      void (async () => {
        try {
          await sessionReplay
            .init(apiKey, {
              deviceId,
              sessionId,
              logLevel,
              privacyConfig,
              ...(captureFullSnapshotOnFocus !== undefined ? { captureFullSnapshotOnFocus } : {}),
            })
            .promise;
        } catch (err) {
          document.getElementById('status').textContent = 'error: ' + err.message;
          window.srError = err.message;
        }

        window.srReady = true;
        document.getElementById('status').textContent = 'ready';
      })();
    </script>
  </body>
</html>
