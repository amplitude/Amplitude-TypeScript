<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Track Embedded Mux Video Test</title>
  </head>
  <body>
    <h1>Track Embedded Mux Video Test</h1>
    <iframe
      id="player"
      src="https://player.mux.com/dE02GfTAlJD4RcqNAlgiS2m00LqbdFqlBm?&metadata-video-title=All about thumbnails&metadata-user-id=user-1138"
      style="width: 100%; border: none; aspect-ratio: 16/9;"
      allow="autoplay; encrypted-media; picture-in-picture;"
      allowfullscreen
    ></iframe>
    <button id="stop-video">Stop Capturing</button>
    <script src="https://cdn.jsdelivr.net/npm/player.js@latest/dist/player.min.js"></script>
    <script type="module">
      import * as amplitude from '@amplitude/analytics-browser';
      import { VideoCapture } from '../../packages/analytics-browser/src/video-capture/video-capture';

      // generate a View Session ID to be used for Mux and Amplitude
      // so that views can be linked together
      const muxViewSessionId = Date.now();

      // the User ID of the logged-in user (if available)
      // (do not use an ID with PII)
      const userId = 'random-user-id';
      
      const iframe = document.getElementById('player');
      const player = new playerjs.Player(iframe);
      
      // AMPLITUDE VIDEO ANALYTICS

      // initialize Amplitude
      amplitude.setUserId(userId);
      amplitude.init(import.meta.env.VITE_AMPLITUDE_API_KEY, {
        fetchRemoteConfig: false,
        autocapture: false,
      }).promise.then(() => {
        // TODO: see if it's possible to update the player data with Amplitude data
        // player.updateData({
        //   custom_1: amplitude.getDeviceId(),
        //   custom_2: amplitude.getSessionId(),
        // });
      });

      // capture analytics events for Video Start and Video Stop
      const videoCapture = new VideoCapture(amplitude)
        .withEmbeddedPlayer(player)
        .withVendor('mux')
        .withExtraEventProperties({
          // capture this so client and server events can be linked together
          mux_view_session_id: muxViewSessionId,
        })
        .captureVideoStarted()
        .captureVideoStopped()
        .start();

      document.getElementById('stop-video').addEventListener('click', () => {
        videoCapture.stop();
      });
    </script>
  </body>
</html>
