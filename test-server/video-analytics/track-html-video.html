<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Track HTML Video Test</title>
  </head>
  <body>
    <video id="video" controls width="640" preload="metadata">
      <source src="https://stream.mux.com/iBXEG00ifc9cPSv005eKgQ01g3w42LUGdlFWlmeosVuGfU.m3u8" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/mux-embed@latest/dist/mux.min.js"></script>
    <h1>Track HTML Video Test</h1>
    <script type="module">
      // TODO: export this from "analytics-core" package index
      import { trackHtmlVideo } from '../../packages/analytics-core/src/video-analytics/track-video';
      import { init, track, setUserId, getDeviceId, setDeviceId, getSessionId, setSessionId } from '@amplitude/analytics-browser';
      import { VideoObserver } from '../../packages/analytics-core/src/observers/video';

      const video = document.getElementById('video');
      const muxViewSessionId = Date.now();
      const userId = 'random-user-id';
      mux.monitor(video, {
        data: {
          view_session_id: muxViewSessionId,
          viewer_user_id: userId,
        },
      });

      setUserId(userId);
      init(import.meta.env.VITE_AMPLITUDE_API_KEY, {
        fetchRemoteConfig: false,
        autocapture: false,
      }).promise.then(() => {
        mux.updateData(video, {
          custom_1: getDeviceId(),
          custom_2: getSessionId(),
        });
        const observer = new VideoObserver({
          videoEl: video, 
          onStateChange: (previousState, nextState) => {
            if (previousState.videoState === 'playing' && nextState.videoState !== 'playing') {
              track('Video Paused', {
                mux_view_session_id: muxViewSessionId,
                ...nextState.lastEvent,
              });
            } else if (previousState.videoState !== 'playing' && nextState.videoState === 'playing') {
              track('Video Started', {
                mux_view_session_id: muxViewSessionId,
                ...nextState.lastEvent,
              });
            }
          },
          vendor: 'mux',
        });
      });
    </script>
  </body>
</html>
