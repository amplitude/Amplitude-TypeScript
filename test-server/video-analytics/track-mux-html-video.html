<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Track HTML Video Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player" defer></script>
  </head>
  <body>
    <mux-player
      id="test-video"
      playback-id="uNbxnGLKJ00yfbijDO8COxTOyVKT01xpxW"
      metadata-video-title="My Video"
      metadata-video-id="video-123"
      metadata-viewer-user-id="dangr"
    ></mux-player>
    <h1>Track HTML Video Test</h1>
    <script type="module">
      // TODO: export this from "analytics-core" package index
      import { trackMuxHtmlVideo } from '../../packages/analytics-core/src/video-analytics/track-video';

      const handler = {
        onPlay: (evt) => {
          console.log('video played', evt);
        },
        onPause: (evt) => {
          console.log('video paused', evt);
        },
        onEnded: (evt) => {
          console.log('video ended', evt);
        },
      };
      const video = document.getElementById('test-video');
      trackMuxHtmlVideo(video, handler, { title: 'Test Video' });
    </script>
  </body>
</html>
