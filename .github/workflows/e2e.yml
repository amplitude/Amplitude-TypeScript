name: E2E Tests

on:
  push:
    branches:
      - main
      - v1.x
  pull_request:
    types: [opened, synchronize]

jobs:
  e2e:
    name: E2E Tests
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.55.0

    steps:
      - name: Check out git repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          fetch-depth: 0

      - name: Run E2E tests
        uses: ./.github/actions/e2e-test
        with:
          amplitude-api-key: ${{ secrets.AMPLITUDE_API_KEY }}

  check-rn-e2e-affected:
    name: Check @amplitude/analytics-react-native-test affected
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    outputs:
      unaffected: ${{ steps.package-unaffected.outputs.unaffected }}
    env:
      NX_BASE: ${{ github.event.pull_request.base.sha }}
      NX_HEAD: ${{ github.sha }}

    steps:
      - name: Check out git repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install project dependencies
        run: pnpm install --frozen-lockfile

      - name: Check if analytics-react-native-test is affected
        id: package-unaffected
        run: |
          set +e
          sh scripts/is-package-unaffected.sh @amplitude/analytics-react-native-test
          code=$?
          set -e
          if [ "$code" -eq 0 ]; then
            echo "unaffected=true" >> "$GITHUB_OUTPUT"
          else
            echo "unaffected=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip React Native E2E (package not affected)
        if: steps.package-unaffected.outputs.unaffected == 'true'
        run: echo "Skipping React Native E2E — @amplitude/analytics-react-native-test is not in the affected set."

  e2e-react-native:
    name: E2E Tests - React Native (${{ matrix.platform }}, newArch=${{ matrix.new-arch }})
    needs: check-rn-e2e-affected
    if: >
      github.actor != 'dependabot[bot]' &&
      (needs.check-rn-e2e-affected.outputs.unaffected == 'false' || github.event_name != 'pull_request')
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ios
            new-arch: 'true'
            runs-on: macos-14
          - platform: ios
            new-arch: 'false'
            runs-on: macos-14
          - platform: android
            new-arch: 'true'
            runs-on: ubuntu-latest
          - platform: android
            new-arch: 'false'
            runs-on: ubuntu-latest
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

    steps:
      - name: Check out git repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          fetch-depth: 0

      - name: Run React Native E2E harness
        uses: ./.github/actions/e2e-react-native
        with:
          platform: ${{ matrix.platform }}
          new-arch: ${{ matrix.new-arch }}
