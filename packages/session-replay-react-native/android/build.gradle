def reactNativeArchitectures() {
  def value = rootProject.getProperties().get("reactNativeArchitectures")
  return value ? value.split(",") : ["armeabi-v7a", "x86", "x86_64", "arm64-v8a"]
}

def isNewArchitectureEnabled() {
  return rootProject.hasProperty("newArchEnabled") && rootProject.getProperty("newArchEnabled") == "true"
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

if (isNewArchitectureEnabled()) {
  apply plugin: "com.facebook.react"
}

def getExtOrDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties["SessionReplayReactNative_" + name]
}

def getExtOrIntegerDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["SessionReplayReactNative_" + name]).toInteger()
}

def supportsNamespace() {
  def parsed = com.android.Version.ANDROID_GRADLE_PLUGIN_VERSION.tokenize('.')
  def major = parsed[0].toInteger()
  def minor = parsed[1].toInteger()

  // Namespace support was added in 7.3.0
  return (major == 7 && minor >= 3) || major >= 8
}

def patchShadowNodesHeader() {
  def generatedDir = file("$buildDir/generated/source/codegen/jni/react/renderer/components/SRMaskViewSpec")
  def shadowNodesHeader = new File(generatedDir, "ShadowNodes.h")

  if (!shadowNodesHeader.exists()) {
    throw new GradleException(
      "[SessionReplayReactNative] Expected codegen ShadowNodes.h at ${shadowNodesHeader.absolutePath}. " +
      "Ensure newArchEnabled=true and generateCodegenArtifactsFromSchema ran successfully."
    )
  }

  def original = shadowNodesHeader.getText("UTF-8")
  def pattern = /(?s)using SRMaskViewShadowNode = ConcreteViewShadowNode<.*?>;/

  if (!(original =~ pattern)) {
    throw new GradleException(
      "[SessionReplayReactNative] patchShadowNodesHeader regex did not match ShadowNodes.h. " +
      "React Native codegen output may have changed; update the patch task before shipping."
    )
  }

  def replacement = """class SRMaskViewShadowNode final
    : public ConcreteViewShadowNode<
          SRMaskViewComponentName,
          SRMaskViewProps,
          SRMaskViewEventEmitter> {
 public:
  SRMaskViewShadowNode(
      const ShadowNodeFragment& fragment,
      const ShadowNodeFamily::Shared& family,
      ShadowNodeTraits traits)
      : ConcreteViewShadowNode(fragment, family, traits) {
    initialize();
  }

  SRMaskViewShadowNode(
      const ShadowNode& sourceShadowNode,
      const ShadowNodeFragment& fragment)
      : ConcreteViewShadowNode(sourceShadowNode, fragment) {
    initialize();
  }

 private:
  void initialize() {
    traits_.unset(ShadowNodeTraits::Trait::ForceFlattenView);
    auto style = yogaNode_.style();
    style.setDisplay(yoga::Display::Contents);
    yogaNode_.setStyle(style);
  }
};"""

  def patched = (original =~ pattern).replaceFirst(replacement)
  if (!patched.contains("ShadowNodeTraits.h")) {
    patched = patched.replace(
      "#include <react/renderer/components/view/ConcreteViewShadowNode.h>",
      """#include <react/renderer/components/view/ConcreteViewShadowNode.h>
#include <react/renderer/core/ShadowNodeTraits.h>
#include <yoga/style/Style.h>"""
    )
  }
  shadowNodesHeader.write(patched, "UTF-8")
}

android {
  if (supportsNamespace()) {
    namespace "com.amplitude.sessionreplayreactnative"

    sourceSets {
      main {
        manifest.srcFile "src/main/AndroidManifestNew.xml"
      }
    }
  }

  compileSdkVersion getExtOrIntegerDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault("minSdkVersion")
    targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")
    buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", isNewArchitectureEnabled().toString()
    testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  packagingOptions {
    pickFirst "lib/**/*.so"
  }

  lintOptions {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }
}

repositories {
  mavenCentral()
  google()
}

def kotlin_version = getExtOrDefault("kotlinVersion")

dependencies {
  implementation("com.amplitude:session-replay-android:[0.24.0,0.25.0)")
  implementation("com.amplitude:analytics-android:[1.25.0,1.26.0)")

  // For < 0.71, this will be from the local maven repo
  // For > 0.71, this will be replaced by `com.facebook.react:react-android:$version` by react gradle plugin
  //noinspection GradleDynamicVersion
  implementation "com.facebook.react:react-native:+"
  implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"

  androidTestImplementation "androidx.test.ext:junit:1.2.1"
  androidTestImplementation "androidx.test:runner:1.6.2"
}

if (isNewArchitectureEnabled()) {
  react {
    jsRootDir = file("../src/specs/")
    libraryName = "SRMaskViewSpec"
    codegenJavaPackageName = "com.amplitude.sessionreplayreactnative"
  }

  afterEvaluate {
    tasks.named("generateCodegenArtifactsFromSchema").configure {
      doLast {
        patchShadowNodesHeader()
      }
    }
  }
}
